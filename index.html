        };

        const SettingsView = ({ tempUrl, setUrl, newServiceName, setNewServiceName, newServiceParts, setNewServiceParts, newServiceLabor, setNewServiceLabor, newServiceStock, setNewServiceStock, handleAddService, handleDeleteService, staffList, newStaffName, setNewStaffName, handleAddStaff, handleDeleteStaff, shopInfo, setShopInfo, quickServices, testConnection, isLoading, isCloudEnabled, saveSettingsToCloud, isSavingSettings, editingId, editName, setEditName, editPartsPrice, setEditPartsPrice, editLaborHours, setEditLaborHours, editStock, setEditStock, handleStartEdit, handleSaveEdit, handleCancelEdit }) => {
            const handleLogoChange = async (e) => { const file = e.target.files[0]; if (file) { const compressed = await compressImage(file); setShopInfo({ ...shopInfo, logo: compressed }); } };
            return (
                <div className="max-w-2xl mx-auto space-y-6 text-sm">
                    <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm space-y-4">
                        <h2 className="text-xl font-bold flex items-center gap-2"><CloudLightning size={20} className="text-blue-600"/> 雲端連線</h2>
                        <input type="text" value={tempUrl} onChange={e => setUrl(e.target.value)} className="w-full p-3 border border-slate-300 rounded-lg text-xs font-mono bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Google Apps Script 網址"/>
                        <button onClick={() => testConnection(tempUrl)} disabled={isLoading} className={`w-full p-3 rounded-lg font-bold text-white transition-colors flex items-center justify-center gap-2 ${isCloudEnabled ? 'bg-green-600 shadow-lg shadow-green-200' : 'bg-slate-800 hover:bg-slate-700'}`}>{isLoading ? <RefreshCw className="animate-spin" size={18}/> : null}{isCloudEnabled ? '連線成功 - 重新測試' : '測試並儲存連線'}</button>
                        {isCloudEnabled && <button onClick={() => saveSettingsToCloud(null, false)} disabled={isSavingSettings} className="w-full p-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-bold transition-colors flex items-center justify-center gap-2 shadow-lg shadow-indigo-200">{isSavingSettings ? <RefreshCw className="animate-spin" size={18}/> : <UploadCloud size={18}/>}手動備份所有資料到雲端</button>}
                    </div>

                    <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm space-y-4">
                        <h2 className="text-xl font-bold flex items-center gap-2"><Package size={20} className="text-blue-600"/> 維修項目與標準工時設定</h2>
                        <div className="space-y-2 max-h-80 overflow-y-auto pr-2">
                            {quickServices.map((service) => {
                                const parts = service.partsPrice !== undefined ? Number(service.partsPrice) : Number(service.price || 0); const labor = Number(service.laborHours || 0);
                                return (
                                    <div key={service.id} className="flex flex-wrap gap-2 items-center p-3 hover:bg-slate-50 rounded-lg border border-slate-100 transition-colors">
                                        {editingId === service.id ? (
                                            <Fragment>
                                                <input type="text" value={editName} onChange={(e) => setEditName(e.target.value)} className="flex-1 p-2 border border-blue-500 rounded-md text-xs min-w-[100px]" placeholder="名稱"/>
                                                <input type="number" value={editPartsPrice} onChange={(e) => setEditPartsPrice(e.target.value)} className="w-20 p-2 border border-blue-500 rounded-md text-xs" placeholder="零件費"/>
                                                <input type="number" value={editLaborHours} step="0.01" onChange={(e) => setEditLaborHours(e.target.value)} className="w-16 p-2 border border-blue-500 rounded-md text-xs" placeholder="工時(h)"/>
                                                <input type="number" value={editStock} onChange={(e) => setEditStock(e.target.value)} className="w-16 p-2 border border-blue-500 rounded-md text-xs" placeholder="庫存"/>
                                                <button onClick={handleSaveEdit} className="p-2 bg-green-100 text-green-700 rounded hover:bg-green-200"><Check size={18} /></button><button onClick={handleCancelEdit} className="p-2 bg-slate-100 text-slate-600 rounded hover:bg-slate-200"><X size={18} /></button>
                                            </Fragment>
                                        ) : (
                                            <Fragment>
                                                <div className="flex-1 min-w-[120px] font-bold text-slate-700">{service.name}</div>
                                                <div className="text-xs text-slate-500 w-24 text-right bg-slate-50 px-2 py-1 rounded">零件: ${parts}</div><div className="text-xs text-slate-500 w-20 text-right bg-slate-50 px-2 py-1 rounded">工時: {labor}h</div><div className="w-16 text-right text-xs font-bold text-slate-400 bg-slate-50 px-2 py-1 rounded">庫存: {service.stock ?? '-'}</div>
                                                <button onClick={() => handleStartEdit(service)} className="p-2 text-blue-500 hover:bg-blue-50 rounded"><Edit3 size={16} /></button><button onClick={() => handleDeleteService(service.id)} className="p-2 text-red-400 hover:bg-red-50 rounded"><Trash2 size={16} /></button>
                                            </Fragment>
                                        )}
                                    </div>
                                )
                            })}
                        </div>
                        <div className="flex flex-wrap gap-2 items-center pt-4 border-t border-slate-200">
                            <input type="text" placeholder="新項目名稱" value={newServiceName} onChange={(e) => setNewServiceName(e.target.value)} className="flex-1 p-2.5 border border-slate-300 rounded-lg text-xs min-w-[120px] outline-none focus:border-blue-500" />
                            <input type="number" placeholder="零件費" value={newServiceParts} onChange={(e) => setNewServiceParts(e.target.value)} className="w-20 p-2.5 border border-slate-300 rounded-lg text-xs outline-none focus:border-blue-500" />
                            <input type="number" placeholder="工時(h)" step="0.01" value={newServiceLabor} onChange={(e) => setNewServiceLabor(e.target.value)} className="w-20 p-2.5 border border-slate-300 rounded-lg text-xs outline-none focus:border-blue-500" />
                            <input type="number" placeholder="庫存" value={newServiceStock} onChange={(e) => setNewServiceStock(e.target.value)} className="w-16 p-2.5 border border-slate-300 rounded-lg text-xs outline-none focus:border-blue-500" />
                            <button onClick={handleAddService} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-lg flex items-center gap-1 font-bold whitespace-nowrap transition-colors"><Plus size={16} />新增</button>
                        </div>
                    </div>

                    <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm space-y-4">
                        <h2 className="text-xl font-bold flex items-center gap-2"><Users size={20} className="text-blue-600"/> 技師管理</h2>
                        <div className="flex flex-wrap gap-3">
                            {staffList.map(name => (
                                <div key={name} className="flex items-center gap-2 bg-blue-50 text-blue-700 font-bold px-4 py-2 rounded-lg border border-blue-100 shadow-sm">{name}<button onClick={() => handleDeleteStaff(name)} className="text-blue-400 hover:text-red-500 transition-colors p-1"><X size={14}/></button></div>
                            ))}
                        </div>
                        <div className="flex gap-2 pt-2"><input type="text" value={newStaffName} onChange={e => setNewStaffName(e.target.value)} className="flex-1 p-3 border border-slate-300 rounded-lg outline-none focus:border-blue-500" placeholder="輸入技師姓名"/><button onClick={handleAddStaff} className="bg-slate-800 hover:bg-slate-700 text-white font-bold px-6 py-3 rounded-lg transition-colors">新增</button></div>
                    </div>

                    <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm space-y-5">
                        <h2 className="text-xl font-bold flex items-center gap-2"><Store size={20} className="text-blue-600"/> 店鋪設定</h2>
                        <div className="bg-blue-50 border border-blue-100 p-4 rounded-xl">
                            <label className="block text-slate-800 font-bold mb-1 text-sm">店鋪基本工資率 (Hourly Rate)</label><p className="text-xs text-blue-600/80 mb-3">此設定將影響所有「標準工時」的計算。例如：工資率 $800/hr，標準工時 0.5h，則系統會自動計算出 $400 工資。</p>
                            <div className="flex items-center gap-3"><span className="text-slate-500 font-black text-lg">$</span><input type="number" value={shopInfo.hourlyRate || 800} onChange={e => setShopInfo({...shopInfo, hourlyRate: Number(e.target.value)})} className="w-32 p-2.5 border border-blue-200 rounded-lg font-black text-blue-700 text-lg outline-none focus:ring-2 focus:ring-blue-500"/><span className="text-slate-500 font-medium">/ 每小時</span></div>
                        </div>
                        <div className="border-t border-slate-200 pt-5">
                            <label className="block text-slate-600 font-bold mb-2 text-sm">店鋪 Logo</label>
                            <div className="flex items-center gap-4 bg-slate-50 p-4 rounded-xl border border-slate-100">
                                {shopInfo.logo && <img src={shopInfo.logo} className="w-16 h-16 object-contain bg-white border border-slate-200 p-1 rounded-lg shadow-sm"/>}
                                <Fragment><input type="file" accept="image/*" className="text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer" onChange={handleLogoChange}/></Fragment>
                            </div>
                        </div>
                        <div className="space-y-4 pt-2">
                            <div><label className="block text-slate-600 font-bold mb-1.5 text-sm">店鋪名稱</label><input type="text" value={shopInfo.name} onChange={e => setShopInfo({...shopInfo, name: e.target.value})} className="w-full p-3 border border-slate-300 rounded-lg outline-none focus:border-blue-500 font-bold text-slate-800"/></div>
                            <div><label className="block text-slate-600 font-bold mb-1.5 text-sm">地址</label><input type="text" value={shopInfo.address} onChange={e => setShopInfo({...shopInfo, address: e.target.value})} className="w-full p-3 border border-slate-300 rounded-lg outline-none focus:border-blue-500"/></div>
                            <div><label className="block text-slate-600 font-bold mb-1.5 text-sm">聯絡電話</label><input type="text" value={shopInfo.phone} onChange={e => setShopInfo({...shopInfo, phone: e.target.value})} className="w-full p-3 border border-slate-300 rounded-lg outline-none focus:border-blue-500"/></div>
                        </div>
                    </div>
                </div>
            );
        };

        const ReceiptModal = ({ showReceiptModal, setShowReceiptModal, selectedRecord, shopInfo }) => {
            if (!showReceiptModal || !selectedRecord) return null;
            const oRate = Number(selectedRecord.hourlyRate || shopInfo.hourlyRate || 800);

            return (
            <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-[9999] p-4">
                <div className="bg-white w-full max-w-md rounded-xl shadow-2xl flex flex-col max-h-[90vh] overflow-hidden">
                <div className="bg-slate-900 text-white p-3 flex justify-between items-center"><h3 className="font-bold text-sm">收據預覽</h3><div className="flex gap-2"><button onClick={() => window.print()} className="bg-blue-600 px-3 py-1.5 rounded text-xs hover:bg-blue-700 transition-colors">列印</button><button onClick={() => setShowReceiptModal(false)} className="bg-slate-700 px-3 py-1.5 rounded text-xs hover:bg-slate-600 transition-colors">關閉</button></div></div>
                <div className="p-6 overflow-y-auto flex-1 text-slate-800 text-xs">
                    <div className="text-center">{shopInfo.logo && <img src={shopInfo.logo} className="h-12 mx-auto mb-2 object-contain"/>}<h1 className="text-lg font-bold">{shopInfo.name}</h1><p>{shopInfo.address}</p><p>TEL: {shopInfo.phone}</p></div>
                    <div className="my-4 border-t-2 border-b-2 py-2 flex justify-between"><div><p>日期: {formatDate(selectedRecord.date)}</p></div><div className="text-right font-bold">{safeRender(selectedRecord.plate)}</div></div>
                    <table className="w-full text-left mb-4">
                        <thead><tr className="border-b font-bold"><th className="py-2">項目</th><th className="py-2 text-right">零件</th><th className="py-2 text-right">工時</th><th className="py-2 text-center">數量</th><th className="text-right py-2">小計</th></tr></thead>
                        <tbody>{selectedRecord.items?.map((item, idx) => {
                            const parts = item.partsPrice !== undefined ? Number(item.partsPrice) : Number(item.price || 0); const hours = Number(item.laborHours || 0); const labor = hours * oRate; const sub = (parts + labor) * Number(item.qty || 1);
                            return (<tr key={idx} className="border-b border-slate-100 border-dashed"><td className="py-2 whitespace-nowrap">{item.name}</td><td className="py-2 text-right">${parts.toLocaleString()}</td><td className="py-2 text-right">{hours > 0 ? `${hours}h` : '-'}</td><td className="py-2 text-center">{item.qty}</td><td className="py-2 text-right font-bold">${sub.toLocaleString()}</td></tr>)
                        })}</tbody>
                    </table>
                    <div className="text-right font-bold text-lg pt-2">總計: ${Number(selectedRecord.total || 0).toLocaleString()}</div>
                    <p className="mt-8 text-slate-400 text-center whitespace-pre-wrap">{shopInfo.note}</p>
                    {(selectedRecord.photo1 || selectedRecord.photo2) && (<div className="mt-6 pt-4 border-t-2 border-slate-100 border-dashed"><p className="font-bold text-slate-600 mb-2">維修照片紀錄</p><div className="flex gap-2">{selectedRecord.photo1 && <img src={selectedRecord.photo1} className="w-1/2 h-32 object-cover rounded-lg border border-slate-200" alt="維修照片1" />}{selectedRecord.photo2 && <img src={selectedRecord.photo2} className="w-1/2 h-32 object-cover rounded-lg border border-slate-200" alt="維修照片2" />}</div></div>)}
                </div>
                </div>
            </div>
            );
        };

        const loadFromLocal = (key, defaultVal, isArray = true) => { try { const saved = localStorage.getItem(key); if (saved && saved !== 'undefined' && saved !== 'null') { const parsed = JSON.parse(saved); if (isArray && !Array.isArray(parsed)) return defaultVal; return parsed; } return defaultVal; } catch(e) { return defaultVal; } };

        const App = () => {
            const [view, setView] = useState('new-order');
            const [customers, setCustomers] = useState(() => { const data = loadFromLocal('moto_customers', []); return data.filter(c => c && c.plate); });
            const [records, setRecords] = useState(() => loadFromLocal('moto_records', []));
            const [cashRecords, setCashRecords] = useState(() => loadFromLocal('moto_cashRecords', [])); 
            const [shopInfo, setShopInfo] = useState(() => { const data = loadFromLocal('moto_shopInfo', null, false); return data ? { ...DEFAULT_SHOP_INFO, ...data } : DEFAULT_SHOP_INFO; });
            const [quickServices, setQuickServices] = useState(() => loadFromLocal('moto_quickServices', DEFAULT_SERVICES));
            const [staffList, setStaffList] = useState(() => loadFromLocal('moto_staffList', ['MICHAEL', '小宇']));
            
            const [draftOrder, setDraftOrder] = useState(INITIAL_ORDER_STATE);
            const [gasUrl, setGasUrl] = useState(DEFAULT_GAS_URL);
            const [tempUrl, setTempUrl] = useState(DEFAULT_GAS_URL);
            const [isCloudEnabled, setIsCloudEnabled] = useState(false);
            const [isLoading, setIsLoading] = useState(false);
            const [isSavingSettings, setIsSavingSettings] = useState(false);
            const [isUploadingOrder, setIsUploadingOrder] = useState(false); 
            const [selectedRecord, setSelectedRecord] = useState(null);
            const [showReceiptModal, setShowReceiptModal] = useState(false);
            
            const [newServiceName, setNewServiceName] = useState('');
            const [newServiceParts, setNewServiceParts] = useState('');
            const [newServiceLabor, setNewServiceLabor] = useState('');
            const [newServiceStock, setNewServiceStock] = useState('');
            const [newStaffName, setNewStaffName] = useState('');

            const [dialog, setDialog] = useState({ isOpen: false, type: 'alert', message: '', onConfirm: null });
            const showAlert = (message) => setDialog({ isOpen: true, type: 'alert', message, onConfirm: null });
            const showConfirm = (message, onConfirm) => setDialog({ isOpen: true, type: 'confirm', message, onConfirm });

            const [editingId, setEditingId] = useState(null);
            const [editName, setEditName] = useState('');
            const [editPartsPrice, setEditPartsPrice] = useState('');
            const [editLaborHours, setEditLaborHours] = useState('');
            const [editStock, setEditStock] = useState('');

            useEffect(() => { if (gasUrl) { setIsCloudEnabled(true); fetchCloudData(gasUrl); } }, []);

            useEffect(() => {
                localStorage.setItem('moto_customers', JSON.stringify(customers)); localStorage.setItem('moto_records', JSON.stringify(records)); localStorage.setItem('moto_shopInfo', JSON.stringify(shopInfo)); localStorage.setItem('moto_quickServices', JSON.stringify(quickServices)); localStorage.setItem('moto_staffList', JSON.stringify(staffList)); localStorage.setItem('moto_cashRecords', JSON.stringify(cashRecords)); localStorage.setItem('moto_gasUrl', gasUrl);
            }, [customers, records, shopInfo, quickServices, staffList, cashRecords, gasUrl]);

            const fetchCloudData = async (url) => {
                if (!url) return; setIsLoading(true);
                try {
                    const response = await fetch(url, { method: 'POST', body: JSON.stringify({ action: 'get_all' }) });
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    const data = await response.json();
                    if (data.status === 'success') {
                        if (Array.isArray(data.customers) && data.customers.length > 0) setCustomers(data.customers.filter(c => c && c.plate));
                        if (Array.isArray(data.records) && data.records.length > 0) {
                            const safeRecords = data.records.map(r => ({...r}));
                            safeRecords.sort((a, b) => { const tA = new Date(a.timestamp || a.date).getTime(); const tB = new Date(b.timestamp || b.date).getTime(); return (isNaN(tB) ? 0 : tB) - (isNaN(tA) ? 0 : tA); });
                            setRecords(safeRecords);
                        }
                        if (data.settings) {
                            if(data.settings.shopInfo && Object.keys(data.settings.shopInfo).length > 0) setShopInfo({...DEFAULT_SHOP_INFO, ...data.settings.shopInfo});
                            if(Array.isArray(data.settings.quickServices) && data.settings.quickServices.length > 0) setQuickServices(data.settings.quickServices);
                            if(Array.isArray(data.settings.staffList) && data.settings.staffList.length > 0) setStaffList(data.settings.staffList);
                            if(Array.isArray(data.settings.cashRecords) && data.settings.cashRecords.length > 0) setCashRecords(data.settings.cashRecords);
                        }
                    }
                } catch (e) { console.error("Sync fetch error:", e); } finally { setIsLoading(false); }
            };

            const handleCreateOrder = async (orderData) => {
                const ds = new Date().toLocaleDateString('zh-TW'); const ts = new Date().toISOString(); const sp = String(orderData.plate).toUpperCase();
                let nc; let updatedCustomers = [...customers]; const ec = updatedCustomers.find(c => c.plate === sp);
                
                if (ec) { 
                    nc = { 
                        ...ec, 
                        name: orderData.name || ec.name, 
                        phone: orderData.phone || ec.phone,
                        email: orderData.email || ec.email,
                        year: orderData.year || ec.year,
                        bikeModel: orderData.bikeModel || ec.bikeModel,
                        lastVisit: ds, 
                        lastMileage: orderData.mileage 
                    }; 
                    updatedCustomers = updatedCustomers.map(c => c.id === ec.id ? nc : c); 
                } else { 
                    nc = { 
                        id: Date.now().toString(), 
                        plate: sp, 
                        name: orderData.name, 
                        phone: orderData.phone,
                        email: orderData.email,
                        year: orderData.year,
                        bikeModel: orderData.bikeModel,
                        firstVisit: ds, 
                        lastVisit: ds, 
                        lastMileage: orderData.mileage 
                    }; 
                    updatedCustomers.push(nc); 
                }
                setCustomers(updatedCustomers);

                const updatedServices = quickServices.map(s => { const used = orderData.items.find(i => i.name === s.name); if (used) { return { ...s, stock: Math.max(0, (s.stock || 0) - (Number(used.qty) || 1)) }; } return s; });
                setQuickServices(updatedServices);

                let nr = { ...orderData, id: Date.now().toString(), customerId: nc.id, date: ds, timestamp: ts };
                let updatedRecords = [nr, ...records];

                if (isCloudEnabled) {
                    setIsUploadingOrder(true);
                    try {
                        const response = await fetch(gasUrl, { method: 'POST', body: JSON.stringify({ action: 'add_order', customer: nc, record: nr, shopInfo }) });
                        const resData = await response.json();
                        
                        let msg = "結帳成功！";
                        if (resData.status === 'success') { 
                            if (resData.record) { nr = resData.record; updatedRecords = [nr, ...records]; }
                            msg = resData.message || msg;
                        }
                        
                        await fetch(gasUrl, { method: 'POST', body: JSON.stringify({ action: 'save_settings', shopInfo, quickServices: updatedServices, staffList, customers: updatedCustomers, records: updatedRecords, cashRecords }) });
                        
                        showAlert(`${msg}\n(資料已同步備份至雲端)`);
                    } catch (e) { 
                        console.error("Upload error:", e); 
                        showAlert("雲端連線發生錯誤，資料將僅保存在本機。"); 
                    } finally { 
                        setIsUploadingOrder(false); 
                    }
                } else {
                    setRecords(updatedRecords); 
                    setDraftOrder(INITIAL_ORDER_STATE); 
                    setView('dashboard'); 
                    setSelectedRecord(nr); 
                    setShowReceiptModal(true);
                    return;
                }

                setRecords(updatedRecords); setDraftOrder(INITIAL_ORDER_STATE); setView('dashboard'); setSelectedRecord(nr); setShowReceiptModal(true);
            };

            const checkAndCreateOrderWrapper = (orderData) => {
                const localDateStr = getLocalDateString(new Date()); const existingCashRec = cashRecords.find(c => c.date === localDateStr);
                if (existingCashRec && existingCashRec.isClosed) { showConfirm(`【警告】今日 (${localDateStr}) 帳務已關帳鎖定！\n新增工單將導致系統應收現金改變，您確定要強制新增嗎？\n(新增後建議回到帳務系統重新對帳)`, () => handleCreateOrder(orderData)); } 
                else { handleCreateOrder(orderData); }
            };

            const deleteRecord = (id) => {
                const recordToDelete = records.find(r => r.id === id); if (!recordToDelete) return;
                const localDateStr = getLocalDateString(new Date(recordToDelete.timestamp || recordToDelete.date)); const existingCashRec = cashRecords.find(c => c.date === localDateStr);
                
                const execDelete = async () => {
                    const updatedRecords = records.filter(r => r.id !== id);
                    setRecords(updatedRecords);
                    if (isCloudEnabled) {
                        try {
                            await fetch(gasUrl, { 
                                method: 'POST', 
                                body: JSON.stringify({ 
                                    action: 'save_settings', 
                                    shopInfo, 
                                    quickServices, 
                                    staffList, 
                                    customers, 
                                    records: updatedRecords, 
                                    cashRecords 
                                }) 
                            });
                            showAlert('維修紀錄已刪除，並同步至雲端。');
                        } catch (e) {
                            showAlert('維修紀錄已刪除 (⚠️雲端同步失敗，請稍後手動備份)');
                        }
                    } else {
                        showAlert('維修紀錄已刪除。');
                    }
                };
                
                if (existingCashRec && existingCashRec.isClosed) { showConfirm(`【警告】該工單所屬日期 (${localDateStr}) 帳務已關帳鎖定！\n刪除將影響系統應收現金，確定要強制刪除嗎？`, execDelete); } 
                else { showConfirm('確定要刪除這筆維修紀錄嗎？', execDelete); }
            };
            
            const testConnection = async (url) => {
                setIsLoading(true);
                try { const res = await fetch(url, { method: 'POST', body: JSON.stringify({ action: 'test' }) }); const data = await res.json(); if (data.status === 'success') { setGasUrl(url); setIsCloudEnabled(true); showAlert("連線成功"); } } 
                catch (e) { showAlert("連線失敗"); } finally { setIsLoading(false); }
            };

            const saveSettingsToCloud = async (customCashRecords = null, silent = false) => {
                setIsSavingSettings(true);
                try { 
                    await fetch(gasUrl, { 
                        method: 'POST', 
                        body: JSON.stringify({ 
                            action: 'save_settings', 
                            shopInfo, 
                            quickServices, 
                            staffList, 
                            customers, 
                            records, 
                            cashRecords: customCashRecords || cashRecords 
                        }) 
                    }); 
                    if (!silent) showAlert("備份完成"); 
                } catch (e) { 
                    if (!silent) showAlert("連線失敗"); 
                    throw e; 
                } finally { 
                    setIsSavingSettings(false); 
                }
            };

            const handleAddService = () => { if (!newServiceName) return; setQuickServices(prev => [...prev, { id: Date.now().toString(), name: newServiceName, partsPrice: Number(newServiceParts || 0), laborHours: Number(newServiceLabor || 0), stock: Number(newServiceStock || 999) }]); setNewServiceName(''); setNewServiceParts(''); setNewServiceLabor(''); setNewServiceStock(''); };
            const handleDeleteService = (id) => { showConfirm("確定刪除此項目？", () => setQuickServices(prev => prev.filter(s => s.id !== id))); };
            
            const handleStartEdit = (s) => { setEditingId(s.id); setEditName(s.name); setEditPartsPrice(s.partsPrice !== undefined ? s.partsPrice : s.price || 0); setEditLaborHours(s.laborHours || 0); setEditStock(s.stock || 0); };
            const handleSaveEdit = () => { setQuickServices(quickServices.map(s => s.id === editingId ? { ...s, name: editName, partsPrice: Number(editPartsPrice), laborHours: Number(editLaborHours), stock: Number(editStock) } : s)); setEditingId(null); };
            const handleCancelEdit = () => { setEditingId(null); };

            const handleAddStaff = () => { if (!newStaffName) return; setStaffList(prev => [...prev, newStaffName.toUpperCase()]); setNewStaffName(''); };
            const handleDeleteStaff = (name) => { showConfirm(`確定移除 ${name}？`, () => setStaffList(prev => prev.filter(s => s !== name))); };

            return (
                <div className="flex flex-col md:flex-row h-[100dvh] bg-slate-100 font-sans text-slate-900 overflow-hidden">
                <Sidebar view={view} setView={setView} isCloudEnabled={isCloudEnabled} shopInfo={shopInfo} />
                
                <main className="flex-1 overflow-y-auto p-2 md:p-8 relative bg-slate-100 w-full">
                    {view === 'dashboard' && <Dashboard records={records} deleteRecord={deleteRecord} setSelectedRecord={setSelectedRecord} setShowReceiptModal={setShowReceiptModal} />}
                    {view === 'new-order' && <NewOrderForm draftOrder={draftOrder} setDraftOrder={setDraftOrder} customers={customers} records={records} quickServices={quickServices} staffList={staffList} shopInfo={shopInfo} handleCreateOrder={checkAndCreateOrderWrapper} setView={setView} showAlert={showAlert} showConfirm={showConfirm} isUploadingOrder={isUploadingOrder} />}
                    {view === 'workforce' && <WorkforceView records={records} staffList={staffList} shopInfo={shopInfo} />}
                    {view === 'cashier' && <CashierView records={records} cashRecords={cashRecords} setCashRecords={setCashRecords} showAlert={showAlert} showConfirm={showConfirm} saveSettingsToCloud={saveSettingsToCloud} isCloudEnabled={isCloudEnabled} isSavingSettings={isSavingSettings} />}
                    {view === 'reminders' && <RemindersView customers={customers} shopInfo={shopInfo} gasUrl={gasUrl} isCloudEnabled={isCloudEnabled} showAlert={showAlert} />}
                    {view === 'customers' && <CustomersView customers={customers} records={records} isLoading={isLoading} />}
                    {view === 'settings' && (
                        <SettingsView tempUrl={tempUrl} setUrl={setTempUrl} newServiceName={newServiceName} setNewServiceName={setNewServiceName} newServiceParts={newServiceParts} setNewServiceParts={setNewServiceParts} newServiceLabor={newServiceLabor} setNewServiceLabor={setNewServiceLabor} newServiceStock={newServiceStock} setNewServiceStock={setNewServiceStock} handleAddService={handleAddService} handleDeleteService={handleDeleteService} staffList={staffList} newStaffName={newStaffName} setNewStaffName={setNewStaffName} handleAddStaff={handleAddStaff} handleDeleteStaff={handleDeleteStaff} shopInfo={shopInfo} setShopInfo={setShopInfo} quickServices={quickServices} testConnection={testConnection} isLoading={isLoading} isCloudEnabled={isCloudEnabled} saveSettingsToCloud={saveSettingsToCloud} isSavingSettings={isSavingSettings} editingId={editingId} editName={editName} setEditName={setEditName} editPartsPrice={editPartsPrice} setEditPartsPrice={setEditPartsPrice} editLaborHours={editLaborHours} setEditLaborHours={setEditLaborHours} editStock={editStock} setEditStock={setEditStock} handleStartEdit={handleStartEdit} handleSaveEdit={handleSaveEdit} handleCancelEdit={handleCancelEdit} />
                    )}
                </main>
                
                <BottomNav view={view} setView={setView} />
                <ReceiptModal showReceiptModal={showReceiptModal} setShowReceiptModal={setShowReceiptModal} selectedRecord={selectedRecord} shopInfo={shopInfo} />
                <GlobalDialog dialog={dialog} setDialog={setDialog} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
