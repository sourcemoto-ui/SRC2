        const safeRender = (value, fallback = '-') => {
            if (value === null || value === undefined || value === '') return fallback;

        const formatDate = (dateStr) => {
            if (!dateStr) return '-';
            try {
                const date = new Date(dateStr);
                if (isNaN(date.getTime())) return safeRender(dateStr);
                return date.toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' });

        };

        const compressImage = (file) => {
            return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 1024;
                const MAX_HEIGHT = 768;
                let width = img.width;
                let height = img.height;

                if (width > height) {
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                } else {
                    if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                }

                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/jpeg', 0.6));
                };
            };
            });
        };

            try { document.execCommand('copy'); if (onSuccess) onSuccess(); } catch (err) { if (onFail) onFail(); }

        const NewOrderForm = ({ draftOrder, setDraftOrder, customers, records, quickServices, staffList, shopInfo, handleCreateOrder, setView, showAlert, showConfirm, isUploadingOrder }) => {
            const [lastServiceHint, setLastServiceHint] = useState(null);
            const [lastMileageRecord, setLastMileageRecord] = useState(null);
            const [isRecognizing, setIsRecognizing] = useState(false);
            const plateCameraRef = useRef(null);
            const fileInputRef1 = useRef(null);
            const fileInputRef2 = useRef(null);

            const hourlyRate = Number(shopInfo.hourlyRate || 800);

            const updateDraft = (field, value) => { setDraftOrder(prev => ({ ...prev, [field]: value })); };

            const handlePaymentChange = (method) => {
                setDraftOrder(prev => ({ ...prev, paymentMethod: method, paymentNote: method === '現金' ? '' : prev.paymentNote }));
            };

            useEffect(() => {
            if (draftOrder.plate && draftOrder.plate.length >= 3) {
                const safePlate = String(draftOrder.plate).toUpperCase();
                const exist = customers.find(c => c && c.plate && String(c.plate).toUpperCase() === safePlate);
                
                if (exist) {
                    setDraftOrder(prev => {
                        if (!prev.name) return { ...prev, name: exist.name || '', phone: exist.phone || '', email: exist.email || '', year: exist.year || '', bikeModel: exist.bikeModel || '' };
                        return prev;
                    });
                    setLastMileageRecord(exist.lastMileage);
                }

                const carRecords = records.filter(r => r.plate && String(r.plate).toUpperCase() === safePlate).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                if (carRecords.length > 0) {
                    const lastRec = carRecords[0];
                    const itemsStr = Array.isArray(lastRec.items) ? lastRec.items.map(i => i.name).join('、') : '無明細';
                    setLastServiceHint({ date: formatDate(lastRec.date), items: itemsStr, mileage: lastRec.mileage });
                } else { setLastServiceHint(null); }
            } else { setLastServiceHint(null); }
            }, [draftOrder.plate, customers, records, setDraftOrder]);

            useEffect(() => { if(draftOrder.mileage) updateDraft('nextMileage', Number(draftOrder.mileage) + 2500); }, [draftOrder.mileage]);

            const handlePlatePhoto = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setIsRecognizing(true);
                try {
                    if (!window.Tesseract) {
                        throw new Error("OCR 模組載入失敗或被瀏覽器阻擋");
                    }

                    const compressedImageBase64 = await compressImage(file);
                    const result = await window.Tesseract.recognize(compressedImageBase64, 'eng');
                    const text = result.data.text;
                    const cleanText = text.replace(/[^A-Z0-9-]/gi, '').toUpperCase();
                    const match = cleanText.match(/[A-Z0-9]{2,4}-?[A-Z0-9]{2,4}/);

                    if (match) {
                        let plate = match[0];
                        if (!plate.includes('-') && plate.length >= 5) {
                            const letters = plate.match(/^[A-Z]+/);
                            if (letters && letters[0].length < plate.length) { plate = letters[0] + '-' + plate.substring(letters[0].length); } 
                            else { plate = plate.substring(0, 3) + '-' + plate.substring(3); }
                        }
                        updateDraft('plate', plate);
                        showAlert(`車牌辨識成功: ${plate}`);
                    } else { showAlert("未能成功辨識車牌，請確認照片清晰度或手動輸入。"); }
                } catch (error) {
                    console.error(error);
                    showAlert("辨識服務執行失敗：" + (error.message || "請手動輸入。"));
                } finally {
                    setIsRecognizing(false);
                    if(plateCameraRef.current) plateCameraRef.current.value = '';
                }
            };

            const handlePhotoChange = async (e, photoKey) => {
                const file = e.target.files[0];
                if (file) { const compressed = await compressImage(file); updateDraft(photoKey, compressed); }
            };

            const addItem = () => { updateDraft('items', [...draftOrder.items, { id: Date.now(), name: '', partsPrice: 0, laborHours: 0, qty: 1, mechanics: {} }]); };
            const removeItem = (id) => { if (draftOrder.items.length > 1) updateDraft('items', draftOrder.items.filter(i => i.id !== id)); };
            const updateItem = (id, field, value) => { updateDraft('items', draftOrder.items.map(i => i.id === id ? { ...i, [field]: value } : i)); };

            const toggleItemMechanic = (id, staffName) => {
                updateDraft('items', draftOrder.items.map(i => {
                    if (i.id === id) return { ...i, mechanics: { ...i.mechanics, [staffName]: !i.mechanics[staffName] } };
                    return i;
                }));
            };

            const getItemTotal = (item) => { return (Number(item.partsPrice || item.price || 0) + (Number(item.laborHours || 0) * hourlyRate)) * Number(item.qty || 1); };
            const total = draftOrder.items.reduce((sum, item) => sum + getItemTotal(item), 0);

            const handleSubmit = (e) => {
            e.preventDefault();
            if (!draftOrder.plate) return showAlert('請輸入車牌號碼');
            if (isUploadingOrder) return;
            handleCreateOrder({ ...draftOrder, hourlyRate: hourlyRate, plate: String(draftOrder.plate).toUpperCase(), total });
            };

            const quickAdd = (service) => {
                const executeAdd = () => {
                    setDraftOrder(prev => {
                        const emptyIndex = prev.items.findIndex(i => i.name === '');
                        if (emptyIndex !== -1) {
                            const newItems = [...prev.items];
                            newItems[emptyIndex] = { ...newItems[emptyIndex], name: service.name, partsPrice: service.partsPrice !== undefined ? service.partsPrice : service.price, laborHours: service.laborHours || 0 };
                            return { ...prev, items: newItems };
                        } else {
                            return { ...prev, items: [...prev.items, { id: Date.now(), name: service.name, partsPrice: service.partsPrice !== undefined ? service.partsPrice : service.price, laborHours: service.laborHours || 0, qty: 1, mechanics: {} }] };
                        }
                    });
                };
                if (service.stock !== undefined && service.stock <= 0) showConfirm(`${service.name} 庫存已歸零，確定要加入嗎？`, executeAdd);
                else executeAdd();
            };

            return (

                                        <div className="flex items-center bg-blue-50 border border-blue-300 rounded-lg overflow-hidden focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-blue-500 transition-all shadow-sm">

                                            <input 
                                                type="number" 
                                                value={Math.round((pPrice + laborFee) * Number(item.qty || 1))} 
                                                onChange={(e) => {
                                                    const valStr = e.target.value;
                                                    const newSubtotal = valStr === '' ? 0 : Number(valStr);
                                                    const currentLaborFee = Number(item.laborHours || 0) * hourlyRate;
                                                    const currentQty = Number(item.qty || 1) || 1;
                                                    const newPartsPrice = (newSubtotal / currentQty) - currentLaborFee;
                                                    updateItem(item.id, 'partsPrice', newPartsPrice);
                                                }}
                                                onFocus={(e) => e.target.select()}
                                                className="w-full p-2 bg-transparent text-right font-black text-blue-700 outline-none"
                                            />
                                        </div>
                                    </div>
                                </div>
                                <div className="flex flex-wrap items-center gap-2 pl-2 sm:pl-8 border-t border-dashed border-slate-300 pt-3 mt-3">
                                    <span className="text-xs text-slate-500 flex items-center gap-1"><UserCheck size={12}/> 負責技師:</span>
                                    {staffList.map(staff => (
                                        <label key={staff} className={`cursor-pointer flex items-center gap-1 px-3 py-1.5 rounded-lg text-xs border transition-all ${item.mechanics[staff] ? 'bg-blue-600 text-white border-blue-600 shadow-sm' : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-50'}`}>
                                            <input type="checkbox" className="hidden" checked={item.mechanics[staff] || false} onChange={() => toggleItemMechanic(item.id, staff)} />
                                            {item.mechanics[staff] ? <Check size={12}/> : null} {staff.toUpperCase()}

                    <button type="button" onClick={addItem} className="mt-4 w-full py-3 border-2 border-dashed border-blue-300 text-blue-600 rounded-lg flex items-center justify-center gap-2 hover:bg-blue-50 transition-colors font-medium"><Plus size={18} /> 增加維修項目</button>

                    <div className="grid grid-cols-2 gap-4">
                        <div className="space-y-1">

                                {draftOrder.photo1 ? <img src={draftOrder.photo1} className="w-full h-full object-contain" /> : <div className="text-slate-400 text-center text-sm font-medium"><Plus size={24} className="mx-auto mb-2 text-slate-300"/> 點擊上傳</div>}
                                <input ref={fileInputRef1} type="file" accept="image/*" className="hidden" onChange={(e) => handlePhotoChange(e, 'photo1')} />

                            {draftOrder.photo1 && <button type="button" onClick={() => { updateDraft('photo1', null); fileInputRef1.current.value = ''; }} className="text-xs text-red-500 w-full text-center py-2 hover:bg-red-50 rounded-lg mt-1 transition-colors font-bold">移除照片 1</button>}

                                {draftOrder.photo2 ? <img src={draftOrder.photo2} className="w-full h-full object-contain" /> : <div className="text-slate-400 text-center text-sm font-medium"><Plus size={24} className="mx-auto mb-2 text-slate-300"/> 點擊上傳</div>}
                                <input ref={fileInputRef2} type="file" accept="image/*" className="hidden" onChange={(e) => handlePhotoChange(e, 'photo2')} />

                    </div>
                    </div>

                <div className="sticky bottom-0 bg-white p-4 border-t border-slate-200 z-20 shadow-[0_-10px_20px_-5px_rgba(0,0,0,0.1)] md:rounded-b-xl">

                        {isUploadingOrder ? <Fragment><RefreshCw className="animate-spin" size={20} /> 資料上傳與備份中...</Fragment> : <Fragment><Save size={20} /> 結帳並開單</Fragment>}

        };

        const Dashboard = ({ records, deleteRecord, setSelectedRecord, setShowReceiptModal }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [filterMonth, setFilterMonth] = useState(''); 

            const availableMonths = useMemo(() => {
                const months = new Set();
                records.forEach(r => {
                    const d = r.timestamp ? new Date(r.timestamp) : (r.date ? new Date(r.date.replace(/\//g, '-')) : null);
                    if (d && !isNaN(d.getTime())) { months.add(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`); }
                });
                return Array.from(months).sort().reverse();
            }, [records]);

            useEffect(() => {
                if (!filterMonth) {
                    setFilterMonth(availableMonths.length > 0 ? availableMonths[0] : 'all');
                }
            }, [availableMonths, filterMonth]);

            const { groupedRecords, todayRevenue, monthRevenue } = useMemo(() => {
                const filtered = records.filter(r => {
                    const matchSearch = (r.plate && String(r.plate).toUpperCase().includes(searchTerm.toUpperCase())) || (r.name && String(r.name).includes(searchTerm));
                    let matchMonth = true;
                    if (filterMonth !== 'all') {
                        const d = r.timestamp ? new Date(r.timestamp) : (r.date ? new Date(r.date.replace(/\//g, '-')) : null);
                        matchMonth = (d && !isNaN(d.getTime())) ? `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}` === filterMonth : false;
                    }
                    return matchSearch && matchMonth;
                });

                const groups = {};
                filtered.forEach(r => {
                    const d = r.timestamp ? new Date(r.timestamp) : (r.date ? new Date(r.date.replace(/\//g, '-')) : null);
                    const key = (d && !isNaN(d.getTime())) ? `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}` : '未分類';
                    if (!groups[key]) groups[key] = [];
                    groups[key].push(r);
                });
                
                const finalGrouped = Object.keys(groups).sort((a, b) => a === '未分類' ? 1 : b === '未分類' ? -1 : b.localeCompare(a)).map(k => ({ month: k, records: groups[k] }));

                const ts = new Date().toLocaleDateString('zh-TW'); const cm = new Date().getMonth(); const cy = new Date().getFullYear();
                const todayRev = records.filter(r => r.date === ts).reduce((sum, r) => sum + Number(r.total || 0), 0);
                const monthRev = records.filter(r => { 
                    const d = r.timestamp ? new Date(r.timestamp) : (r.date ? new Date(r.date.replace(/\//g, '-')) : null);
                    return d && !isNaN(d.getTime()) && d.getMonth() === cm && d.getFullYear() === cy;
                }).reduce((sum, r) => sum + Number(r.total || 0), 0);

                return { groupedRecords: finalGrouped, todayRevenue: todayRev, monthRevenue: monthRev };
            }, [records, searchTerm, filterMonth]);

            return (
            <div className="space-y-6 max-w-7xl mx-auto">
                <div className="grid grid-cols-2 gap-4">
                    <div className="bg-gradient-to-br from-blue-500 to-blue-600 rounded-xl p-5 text-white shadow-lg"><p className="text-blue-100 text-sm font-medium mb-1">今日營收</p><div className="text-3xl font-black">${todayRevenue.toLocaleString()}</div></div>
                    <div className="bg-white rounded-xl p-5 border border-slate-200 shadow-sm"><p className="text-slate-500 text-sm font-medium mb-1">本月營收</p><div className="text-3xl font-black text-slate-800">${monthRevenue.toLocaleString()}</div></div>
                </div>
                
                <div className="flex flex-col gap-4">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <h2 className="text-2xl font-bold text-slate-800">維修紀錄看板</h2>
                        <div className="relative w-full sm:w-auto min-w-[250px]">
                            <Search className="absolute left-3 top-3 text-slate-400" size={18} />
                            <input type="text" placeholder="搜尋車牌或姓名..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="pl-10 pr-4 py-2.5 border border-slate-300 rounded-lg text-sm w-full outline-none focus:border-blue-500 shadow-sm" />
                        </div>
                    </div>
                    <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                        <button onClick={() => setFilterMonth('all')} className={`whitespace-nowrap px-5 py-2.5 rounded-lg font-bold text-sm transition-colors shadow-sm flex-shrink-0 ${filterMonth === 'all' ? 'bg-slate-800 text-white' : 'bg-white text-slate-600 hover:bg-slate-50 border border-slate-200'}`}>全部紀錄</button>
                        {availableMonths.map(m => (
                            <button key={m} onClick={() => setFilterMonth(m)} className={`whitespace-nowrap px-5 py-2.5 rounded-lg font-bold text-sm transition-colors shadow-sm flex-shrink-0 ${filterMonth === m ? 'bg-blue-600 text-white' : 'bg-white text-slate-600 hover:bg-slate-50 border border-slate-200'}`}>{m.replace('-', ' 年 ')} 月</button>
                        ))}
                    </div>
                </div>

                <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <div className="overflow-x-auto">
                        <table className="w-full text-left text-sm min-w-[800px]">
                            <thead>
                                <tr className="bg-slate-50 border-b border-slate-200">
                                    <th className="p-4 font-bold text-slate-600 w-28 whitespace-nowrap">日期</th>
                                    <th className="p-4 font-bold text-slate-600 w-48">客戶與車輛</th>
                                    <th className="p-4 font-bold text-slate-600">維修明細</th>
                                    <th className="p-4 font-bold text-slate-600 text-right w-32 whitespace-nowrap">結帳</th>
                                    <th className="p-4 font-bold text-slate-600 text-center w-28">操作</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {groupedRecords.map(group => (
                                    <Fragment key={group.month}>
                                        <tr className="bg-slate-100/80 border-t-2 border-slate-200"><td colSpan="5" className="p-3 px-4 font-bold text-slate-700 text-xs">{group.month === '未分類' ? '舊版未分類紀錄' : `${group.month.split('-')[0]} 年 ${group.month.split('-')[1]} 月`}</td></tr>
                                        {group.records.map(record => (
                                            <tr key={record.id} className="hover:bg-blue-50/50 transition-colors group">
                                                <td className="p-4 align-top text-slate-600 font-medium whitespace-nowrap">{formatDate(record.date)}</td>
                                                <td className="p-4 align-top">
                                                    <div className="font-bold text-blue-600 text-base">{safeRender(record.plate)}</div>
                                                    <div className="text-sm text-slate-700 mt-1">{safeRender(record.name)} <span className="text-slate-400 text-xs ml-1">{safeRender(record.phone)}</span></div>
                                                    <div className="text-xs text-slate-500 mt-1.5 flex items-center gap-1 bg-slate-50 inline-flex px-2 py-1 rounded"><Bike size={12}/> {safeRender(record.bikeModel)} <span className="mx-1 text-slate-300">|</span> {safeRender(record.mileage)} km</div>
                                                </td>
                                                <td className="p-4 align-top">
                                                    <div className="space-y-1.5">{record.items?.map((i, idx) => (<div key={idx} className="text-sm text-slate-700 flex gap-2 items-start"><span className="text-blue-300 mt-0.5">•</span><span className="leading-snug">{i.name} <span className="text-xs text-slate-400 ml-1 font-medium bg-slate-100 px-1 rounded">x{i.qty}</span></span></div>))}</div>
                                                    <div className="flex flex-wrap items-center gap-2 mt-3">
                                                        {record.notes && <div className="text-xs text-orange-700 bg-orange-50 px-2 py-1.5 rounded inline-block whitespace-pre-wrap border border-orange-100">備註: {record.notes}</div>}
                                                        {(record.photo1 || record.photo2) && (
                                                            <div className="flex flex-wrap gap-2 mt-1">
                                                                {record.photo1 && <a href={record.photo1} target="_blank" rel="noopener noreferrer" className="text-xs text-blue-600 hover:text-white bg-blue-50 hover:bg-blue-600 px-2 py-1.5 rounded flex items-center gap-1 border border-blue-200 transition-colors"><Camera size={14} /> 查看照片 1</a>}
                                                                {record.photo2 && <a href={record.photo2} target="_blank" rel="noopener noreferrer" className="text-xs text-blue-600 hover:text-white bg-blue-50 hover:bg-blue-600 px-2 py-1.5 rounded flex items-center gap-1 border border-blue-200 transition-colors"><Camera size={14} /> 查看照片 2</a>}
                                                            </div>
                                                        )}
                                                    </div>
                                                </td>
                                                <td className="p-4 align-top text-right whitespace-nowrap">
                                                    <div className="font-black text-slate-800 text-lg">${Number(record.total || 0).toLocaleString()}</div>
                                                    <div className="text-[10px] text-slate-500 bg-slate-100 border border-slate-200 inline-block px-2 py-1 rounded mt-1 font-medium">{safeRender(record.paymentMethod)}</div>
                                                </td>
                                                <td className="p-4 align-top text-center">
                                                    <div className="flex justify-center gap-2 opacity-80 group-hover:opacity-100 transition-opacity">
                                                        <button onClick={() => { setSelectedRecord(record); setShowReceiptModal(true); }} className="p-2.5 text-blue-600 bg-white border border-slate-200 hover:bg-blue-100 rounded-lg transition-colors shadow-sm" title="查看收據"><FileText size={18} /></button>
                                                        <button onClick={() => deleteRecord(record.id)} className="p-2.5 text-red-500 bg-white border border-slate-200 hover:bg-red-100 rounded-lg transition-colors shadow-sm" title="刪除紀錄"><Trash2 size={18} /></button>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </Fragment>
                                ))}
                                {groupedRecords.length === 0 && <tr><td colSpan="5" className="p-10 text-center text-slate-400">目前找不到符合條件的紀錄</td></tr>}
                            </tbody>
                        </table>

        };

        const ReminderEditModal = ({ isOpen, onClose, customer, type, defaultText, onConfirm, isSending }) => {
            const [text, setText] = useState('');
            useEffect(() => { if (isOpen && defaultText) setText(defaultText); }, [isOpen, defaultText]);
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[9998] p-4">
                    <div className="bg-white w-full max-w-lg rounded-xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
                        <div className={`p-4 text-white flex justify-between items-center ${type === 'email' ? 'bg-green-600' : 'bg-blue-600'}`}>
                            <h3 className="font-bold flex items-center gap-2">{type === 'email' ? <Mail size={20}/> : <MessageSquare size={20}/>} {type === 'email' ? '發送電子郵件提醒' : '複製文字'}</h3>
                            <button onClick={onClose}><X size={20}/></button>

                        <div className="p-4 flex-1 overflow-y-auto"><textarea className="w-full h-48 p-3 border border-slate-300 rounded-lg outline-none text-sm" value={text} onChange={(e) => setText(e.target.value)}></textarea></div>
                        <div className="p-4 border-t bg-slate-50 flex justify-end gap-2">
                            <button onClick={onClose} className="px-4 py-2 text-slate-600 hover:bg-slate-200 rounded-lg text-sm font-medium">取消</button>
                            <button onClick={() => onConfirm(text)} disabled={isSending} className={`px-6 py-2 text-white rounded-lg text-sm font-bold flex items-center gap-2 ${type === 'email' ? 'bg-green-600 hover:bg-green-700' : 'bg-blue-600 hover:bg-blue-700'}`}>{isSending ? <RefreshCw className="animate-spin" size={16}/> : <Check size={16}/>} 確定</button>
                        </div>
                    </div>
                </div>
            );
        };

        const RemindersView = ({ customers, shopInfo, gasUrl, isCloudEnabled, showAlert }) => {
            const [sendingId, setSendingId] = useState(null);
            const [tab, setTab] = useState('oil'); 
            const [modalOpen, setModalOpen] = useState(false);
            const [modalData, setModalData] = useState({ customer: null, type: 'sms', text: '' });

            const { displayCustomers } = useMemo(() => {
                let list = [];
                
                // 安全的日期解析函式
                const getSafeTime = (dateVal) => {
                    if (!dateVal) return 0;
                    const d = new Date(dateVal);
                    if (!isNaN(d.getTime())) return d.getTime();
                    if (typeof dateVal === 'string') {
                        const d2 = new Date(dateVal.replace(/\//g, '-'));
                        if (!isNaN(d2.getTime())) return d2.getTime();
                    }
                    return 0;
                };

                // 過濾出有紀錄的客戶
                const validCustomers = customers.filter(c => c && getSafeTime(c.lastVisit) > 0);

                if (tab === 'all') {
                    // 全部客戶，由新到舊排序
                    list = [...validCustomers].sort((a, b) => getSafeTime(b.lastVisit) - getSafeTime(a.lastVisit));
                } else if (tab === 'top5') {
                    // 最久未回店 (Top 10)，由舊到新排序
                    list = [...validCustomers].sort((a, b) => getSafeTime(a.lastVisit) - getSafeTime(b.lastVisit)).slice(0, 10); 
                } else {
                    // 根據保養時間篩選
                    const months = tab === 'major' ? 18 : 6;
                    const daysThreshold = months * 30;
                    const now = new Date().getTime();
                    list = validCustomers.filter(c => {
                        const lastTime = getSafeTime(c.lastVisit);
                        const diffDays = (now - lastTime) / (1000 * 60 * 60 * 24);
                        return diffDays >= daysThreshold;
                    }).sort((a, b) => getSafeTime(a.lastVisit) - getSafeTime(b.lastVisit));
                }
                return { displayCustomers: list };
            }, [customers, tab]);

            const handleActionClick = (customer, type) => { setModalData({ customer, type, text: `親愛的 ${customer.name || '車主'} 您好，${shopInfo.name} 提醒您該回來檢查愛車囉！` }); setModalOpen(true); };

            const handleConfirmAction = async (finalText) => {
                if (modalData.type === 'sms') { copyToClipboard(finalText, () => showAlert(`已複製內容！`), () => showAlert(`複製失敗，請手動選取複製`)); setModalOpen(false); } 
                else {
                    // 防呆：檢查是否有填寫 Email
                    if (!modalData.customer.email || modalData.customer.email.trim() === '') {
                        showAlert(`發送失敗：客戶 ${modalData.customer.name || '此客戶'} 沒有填寫 Email 資料！`);
                        setModalOpen(false);
                        return;
                    }

                    setSendingId(modalData.customer.id);
                    try { 
                        const response = await fetch(gasUrl, { method: 'POST', body: JSON.stringify({ action: 'send_maintenance_reminder', email: modalData.customer.email, customText: finalText, shopInfo }) }); 
                        const result = await response.json();
                        
                        if (result.status === 'success') {
                            showAlert("Email 發送成功！"); 
                        } else {
                            showAlert(`發送失敗：${result.message || '後端未正確回應'}`);
                        }
                    } 
                    catch (e) { showAlert("連線失敗，請檢查 Apps Script 設定或網路狀態。"); } finally { setSendingId(null); setModalOpen(false); }
                }
            };

            return (
                <div className="space-y-6 max-w-5xl mx-auto">
                    <div className="bg-gradient-to-r from-orange-500 to-red-500 p-6 rounded-xl text-white shadow-lg flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <h2 className="text-xl font-bold flex items-center gap-2"><Bell size={24} /> 保養提醒名單</h2>
                        <div className="flex bg-white/20 p-1.5 rounded-lg overflow-x-auto scrollbar-hide w-full sm:w-auto">
                            <button onClick={() => setTab('oil')} className={`whitespace-nowrap px-4 py-1.5 rounded-md text-sm font-bold transition-colors ${tab === 'oil' ? 'bg-white text-orange-600 shadow-sm' : 'text-white hover:bg-white/10'}`}>半年機油</button>
                            <button onClick={() => setTab('major')} className={`whitespace-nowrap px-4 py-1.5 rounded-md text-sm font-bold transition-colors ${tab === 'major' ? 'bg-white text-orange-600 shadow-sm' : 'text-white hover:bg-white/10'}`}>一年半大保養</button>
                            <button onClick={() => setTab('top5')} className={`whitespace-nowrap px-4 py-1.5 rounded-md text-sm font-bold transition-colors ${tab === 'top5' ? 'bg-white text-orange-600 shadow-sm' : 'text-white hover:bg-white/10'}`}>最久未回店</button>
                            <button onClick={() => setTab('all')} className={`whitespace-nowrap px-4 py-1.5 rounded-md text-sm font-bold transition-colors ${tab === 'all' ? 'bg-white text-orange-600 shadow-sm' : 'text-white hover:bg-white/10'}`}>全部客戶</button>
                        </div>
                    </div>
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left text-sm min-w-[600px]">
                                <thead>
                                    <tr className="bg-slate-50 border-b text-slate-600">
                                        <th className="p-4 font-bold">車牌</th>
                                        <th className="p-4 font-bold">姓名</th>
                                        <th className="p-4 font-bold">上次來店</th>
                                        <th className="p-4 font-bold text-center">通知操作</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {displayCustomers.map(c => (
                                        <tr key={c.id} className="hover:bg-slate-50 transition-colors">
                                            <td className="p-4 font-bold text-slate-800 text-base">{safeRender(c.plate)}</td>
                                            <td className="p-4 text-slate-700">{safeRender(c.name)}</td>
                                            <td className="p-4 text-slate-500 font-medium">{formatDate(c.lastVisit)}</td>
                                            <td className="p-4">
                                                <div className="flex gap-2 justify-center">
                                                    <button onClick={() => handleActionClick(c, 'sms')} className="bg-blue-50 text-blue-600 border border-blue-100 hover:bg-blue-100 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors">LINE / 複製</button>
                                                    <button onClick={() => handleActionClick(c, 'email')} disabled={sendingId === c.id} className="bg-green-50 text-green-700 border border-green-100 hover:bg-green-100 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors disabled:opacity-50 flex items-center gap-1">{sendingId === c.id && <RefreshCw size={12} className="animate-spin"/>} 電子郵件</button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                    {displayCustomers.length === 0 && (
                                        <tr>
                                            <td colSpan="4" className="p-10 text-center text-slate-500">
                                                目前沒有符合條件的客戶。<br/>
                                                <span className="text-xs text-slate-400 mt-2 block">（注意：機油提醒會過濾出超過 6 個月未回店的客戶）</span>
                                            </td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <ReminderEditModal isOpen={modalOpen} onClose={() => setModalOpen(false)} customer={modalData.customer} type={modalData.type} defaultText={modalData.text} onConfirm={handleConfirmAction} isSending={sendingId !== null}/>
                </div>
            );
        };

        const CustomerHistoryModal = ({ customer, records, onClose }) => {
            const history = useMemo(() => records.filter(r => r.plate && String(r.plate).toUpperCase() === String(customer.plate).toUpperCase()).sort((a, b) => {
                const tA = new Date(a.timestamp || a.date).getTime(); const tB = new Date(b.timestamp || b.date).getTime(); return (isNaN(tB) ? 0 : tB) - (isNaN(tA) ? 0 : tA);
            }), [customer, records]);

            return (
                <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-white w-full max-w-2xl rounded-xl flex flex-col max-h-[90vh] overflow-hidden shadow-2xl">
                        <div className="bg-slate-900 text-white p-4 flex justify-between items-center">
                            <h3 className="font-bold flex items-center gap-2"><History size={18} /> {customer.plate} 維修歷史</h3>
                            <button onClick={onClose} className="hover:bg-slate-700 p-1 rounded transition-colors"><X size={20}/></button>
                        </div>
                        <div className="overflow-y-auto flex-1 bg-slate-50 p-4">
                            {history.length > 0 ? (
                                <div className="space-y-3">
                                    {history.map(r => (
                                        <div key={r.id} className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col gap-2">
                                            <div className="flex justify-between items-center border-b border-dashed pb-2"><span className="font-bold text-slate-700">{formatDate(r.date)}</span><span className="font-black text-blue-600">${Number(r.total || 0).toLocaleString()}</span></div>
                                            <div className="text-sm text-slate-600 mt-1">{r.items?.map(i => i.name).join(', ')}</div>
                                            {(r.photo1 || r.photo2) && (
                                                <div className="flex gap-2 mt-2">
                                                    {r.photo1 && <a href={r.photo1} target="_blank" rel="noopener noreferrer" className="text-xs text-blue-600 bg-blue-50 hover:bg-blue-100 px-2 py-1 rounded inline-flex items-center gap-1 border border-blue-200 transition-colors"><Camera size={14} /> 照片 1</a>}
                                                    {r.photo2 && <a href={r.photo2} target="_blank" rel="noopener noreferrer" className="text-xs text-blue-600 bg-blue-50 hover:bg-blue-100 px-2 py-1 rounded inline-flex items-center gap-1 border border-blue-200 transition-colors"><Camera size={14} /> 照片 2</a>}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="text-center py-10 text-slate-400">尚無維修紀錄</div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const CustomersView = ({ customers, records, isLoading }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedHistory, setSelectedHistory] = useState(null);
            const filtered = customers.filter(c => (c.plate && String(c.plate).toUpperCase().includes(searchTerm.toUpperCase())) || (c.name && String(c.name).includes(searchTerm)));
            return (
                <div className="space-y-6 max-w-6xl mx-auto">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white p-4 rounded-xl border shadow-sm">
                        <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><Users className="text-blue-600"/> 客戶資料庫</h2>
                        <div className="relative w-full md:w-auto min-w-[250px]"><Search className="absolute left-3 top-3 text-slate-400" size={18} /><input type="text" placeholder="搜尋車牌或姓名..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="pl-10 pr-4 py-2.5 border border-slate-300 rounded-lg text-sm w-full outline-none focus:border-blue-500 shadow-sm bg-slate-50"/></div>
                    </div>
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left text-sm whitespace-nowrap min-w-[600px]">
                                <thead><tr className="bg-slate-50 border-b border-slate-200 text-slate-600"><th className="p-4 font-bold">車牌</th><th className="p-4 font-bold">姓名</th><th className="p-4 font-bold">車種</th><th className="p-4 font-bold text-center">操作</th></tr></thead>
                                <tbody className="divide-y divide-slate-100">
                                    {filtered.map(c => (
                                        <tr key={c.id} className="hover:bg-slate-50 transition-colors"><td className="p-4 font-bold text-slate-800 text-base">{safeRender(c.plate)}</td><td className="p-4 text-slate-700">{safeRender(c.name)}</td><td className="p-4 text-slate-600">{safeRender(c.bikeModel)}</td><td className="p-4 flex justify-center"><button onClick={() => setSelectedHistory(c)} className="text-blue-600 flex items-center gap-1.5 text-xs bg-blue-50 border border-blue-100 px-4 py-2 rounded-lg hover:bg-blue-100 transition-colors font-bold"><History size={16}/> 歷史紀錄</button></td></tr>
                                    ))}
                                    {filtered.length === 0 && <tr><td colSpan="4" className="p-10 text-center text-slate-400">找不到相符的資料</td></tr>}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    {selectedHistory && <CustomerHistoryModal customer={selectedHistory} records={records} onClose={() => setSelectedHistory(null)}/>}
                </div>
            );
        };

        const WorkforceView = ({ records, staffList, shopInfo }) => {
            const [periodMode, setPeriodMode] = useState('monthly'); 
            const [selectedMonth, setSelectedMonth] = useState(new Date().getMonth());
            const [selectedYear, setSelectedYear] = useState(new Date().getFullYear());
            const [selectedDate, setSelectedDate] = useState(getLocalDateString(new Date()));

            const staffStats = useMemo(() => {
                const stats = {}; staffList.forEach(name => { stats[name] = { tasks: 0, totalHours: 0, laborRevenue: 0, commission: 0 }; });
                records.forEach(record => {
                    const date = new Date(record.timestamp); const orderRate = Number(record.hourlyRate || shopInfo?.hourlyRate || 800);
                    let isMatch = periodMode === 'monthly' ? (date.getMonth() === selectedMonth && date.getFullYear() === selectedYear) : (getLocalDateString(date) === selectedDate);
                    if (isMatch) {
                        record.items?.forEach(item => {
                            const mechanics = Object.keys(item.mechanics || {}).filter(k => item.mechanics[k]);
                            if (mechanics.length > 0) {
                                const totalItemHours = Number(item.laborHours || 0) * Number(item.qty || 1);
                                const laborRev = totalItemHours * orderRate;
                                mechanics.forEach(mech => {
                                    if (stats[mech]) {
                                        stats[mech].tasks += 1; stats[mech].totalHours += totalItemHours / mechanics.length; stats[mech].laborRevenue += laborRev / mechanics.length;
                                        stats[mech].commission += (laborRev / mechanics.length) * 0.25; 
                                    }
                                });
                            }
                        });
                    }
                });
                return stats;
            }, [records, staffList, selectedMonth, selectedYear, selectedDate, periodMode, shopInfo]);

            const totalTeamLaborRevenue = Object.values(staffStats).reduce((sum, s) => sum + s.laborRevenue, 0);

            return (
                <div className="space-y-6 max-w-6xl mx-auto">
                    <div className="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 bg-white p-4 md:p-6 rounded-xl border border-slate-200 shadow-sm">
                        <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2"><Briefcase className="text-blue-600" /> 績效結算看板</h2>
                        <div className="flex flex-col sm:flex-row flex-wrap gap-3 items-start sm:items-center w-full lg:w-auto">
                            <div className="flex bg-slate-100 p-1 rounded-lg w-full sm:w-auto">
                                <button onClick={() => setPeriodMode('monthly')} className={`flex-1 sm:flex-none px-4 py-2 rounded-md text-sm font-bold transition-all ${periodMode === 'monthly' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500'}`}>月結算</button>
                                <button onClick={() => setPeriodMode('daily')} className={`flex-1 sm:flex-none px-4 py-2 rounded-md text-sm font-bold transition-all ${periodMode === 'daily' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500'}`}>日結算</button>
                            </div>
                            {periodMode === 'monthly' ? (
                                <div className="flex gap-2 w-full sm:w-auto"><select value={selectedYear} onChange={e => setSelectedYear(Number(e.target.value))} className="flex-1 sm:flex-none p-2 border border-slate-300 rounded-lg text-sm bg-white outline-none focus:ring-2 focus:ring-blue-500">{[2024, 2025, 2026].map(y => <option key={y} value={y}>{y}年</option>)}</select><select value={selectedMonth} onChange={e => setSelectedMonth(Number(e.target.value))} className="flex-1 sm:flex-none p-2 border border-slate-300 rounded-lg text-sm bg-white outline-none focus:ring-2 focus:ring-blue-500">{Array.from({length: 12}).map((_, i) => <option key={i} value={i}>{i+1}月</option>)}</select></div>
                            ) : (<input type="date" value={selectedDate} onChange={(e) => setSelectedDate(e.target.value)} className="w-full sm:w-auto p-2 border border-slate-300 rounded-lg text-sm bg-white outline-none focus:ring-2 focus:ring-blue-500" />)}
                        </div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div className="bg-gradient-to-br from-blue-600 to-indigo-700 p-6 rounded-xl text-white shadow-lg relative overflow-hidden"><Timer className="absolute -right-4 -bottom-4 text-white opacity-10" size={100} /><p className="text-blue-100 text-sm font-medium">團隊總技術產值</p><h3 className="text-3xl font-black mt-1">${totalTeamLaborRevenue.toLocaleString()}</h3></div>
                        <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm"><p className="text-slate-500 text-sm font-medium">結算區間工單數</p><h3 className="text-3xl font-black text-slate-800 mt-1">{records.filter(r => { const d = new Date(r.timestamp); if (periodMode === 'monthly') return d.getMonth() === selectedMonth && d.getFullYear() === selectedYear; return getLocalDateString(d) === selectedDate; }).length}</h3></div>
                        <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm"><p className="text-slate-500 text-sm font-medium flex items-center gap-1">預估技術獎金 <span className="text-[10px] bg-green-100 text-green-700 px-2 py-0.5 rounded font-bold">工資抽成25%</span></p><h3 className="text-3xl font-black text-green-600 mt-1">${Object.values(staffStats).reduce((sum, s) => sum + s.commission, 0).toLocaleString()}</h3></div>
                    </div>
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left whitespace-nowrap min-w-[700px]">
                                <thead className="bg-slate-50 border-b border-slate-200"><tr><th className="p-4 font-bold text-slate-600">技師名稱</th><th className="p-4 font-bold text-slate-600 text-center">參與項目</th><th className="p-4 font-bold text-slate-600 text-center">累計產出工時</th><th className="p-4 font-bold text-slate-600 text-right">技術產值</th><th className="p-4 font-bold text-slate-600 text-right">預估獎金(25%)</th></tr></thead>
                                <tbody className="divide-y divide-slate-100">
                                    {staffList.map(name => {
                                        const data = staffStats[name];
                                        return (
                                            <tr key={name} className="hover:bg-slate-50 transition-colors">
                                                <td className="p-4"><div className="flex items-center gap-3"><div className="w-10 h-10 rounded-full bg-blue-100 text-blue-700 font-black flex items-center justify-center text-sm">{name.substring(0, 2)}</div><span className="font-bold text-slate-700 text-base">{name}</span></div></td>
                                                <td className="p-4 text-center text-slate-600 font-medium">{data.tasks} 件</td>
                                                <td className="p-4 text-center font-mono"><span className="bg-slate-100 border border-slate-200 px-3 py-1.5 rounded-lg text-slate-700">{data.totalHours.toFixed(2)} hr</span></td>
                                                <td className="p-4 text-right font-mono font-black text-slate-800 text-lg">${data.laborRevenue.toLocaleString(undefined, {maximumFractionDigits: 0})}</td>
                                                <td className="p-4 text-right font-mono text-green-600 font-black text-lg">${data.commission.toLocaleString(undefined, {maximumFractionDigits: 0})}</td>
                                            </tr>
                                        );
                                    })}
                                    {staffList.length === 0 && <tr><td colSpan="5" className="p-10 text-center text-slate-400">目前沒有設定任何技師資料</td></tr>}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const CashierView = ({ records, cashRecords, setCashRecords, showAlert, showConfirm, saveSettingsToCloud, isCloudEnabled, isSavingSettings }) => {
            const todayStr = getLocalDateString(new Date()); 
            const [targetDate, setTargetDate] = useState(todayStr);
            
            const [startingCash, setStartingCash] = useState(''); 
            
            const [incomes, setIncomes] = useState([]);
            const [incDesc, setIncDesc] = useState('');
            const [incAmount, setIncAmount] = useState('');
            
            const [expenses, setExpenses] = useState([]);
            const [expDesc, setExpDesc] = useState(''); 
            const [expAmount, setExpAmount] = useState('');
            
            const [showCalculator, setShowCalculator] = useState(false); 
            const [denoms, setDenoms] = useState({ 1000: '', 500: '', 100: '', 50: '', 10: '', 5: '', 1: '' });
            const [manualActualCash, setManualActualCash] = useState(''); 
            const [note, setNote] = useState(''); 
            const [isClosed, setIsClosed] = useState(false);

            const { cashFromOrders, transferTotal } = useMemo(() => {
                let cash = 0; let transfer = 0;
                records.forEach(r => { 
                    if (getLocalDateString(new Date(r.timestamp)) === targetDate) { 
                        if (r.paymentMethod === '現金') cash += Number(r.total || 0); 
                        if (r.paymentMethod === '匯款') transfer += Number(r.total || 0); 
                    } 
                });
                return { cashFromOrders: cash, transferTotal: transfer };
            }, [records, targetDate]);

            useEffect(() => {
                const savedRecord = cashRecords.find(c => c.date === targetDate);
                if (savedRecord) {
                    setStartingCash(savedRecord.startingCash !== undefined ? savedRecord.startingCash : ''); 
                    setIncomes(savedRecord.incomes || []);
                    setExpenses(savedRecord.expenses || []); 
                    setNote(savedRecord.note || ''); 
                    setIsClosed(savedRecord.isClosed || false);
                    if (savedRecord.denoms) { setDenoms(savedRecord.denoms); setShowCalculator(true); } 
                    else { setManualActualCash(savedRecord.actual !== undefined ? savedRecord.actual : ''); setShowCalculator(false); setDenoms({ 1000: '', 500: '', 100: '', 50: '', 10: '', 5: '', 1: '' }); }
                } else { 
                    setStartingCash(''); 
                    setIncomes([]);
                    setExpenses([]); 
                    setNote(''); 
                    setIsClosed(false); 
                    setManualActualCash(''); 
                    setShowCalculator(false); 
                    setDenoms({ 1000: '', 500: '', 100: '', 50: '', 10: '', 5: '', 1: '' }); 
                }
            }, [targetDate, cashRecords]);

            const addIncome = () => { if (!incDesc || !incAmount) return; setIncomes([...incomes, { id: Date.now(), desc: incDesc, amount: Number(incAmount) }]); setIncDesc(''); setIncAmount(''); };
            const removeIncome = (id) => { setIncomes(incomes.filter(i => i.id !== id)); };

            const addExpense = () => { if (!expDesc || !expAmount) return; setExpenses([...expenses, { id: Date.now(), desc: expDesc, amount: Number(expAmount) }]); setExpDesc(''); setExpAmount(''); };
            const removeExpense = (id) => { setExpenses(expenses.filter(e => e.id !== id)); };

            const totalIncomes = incomes.reduce((sum, i) => sum + i.amount, 0);
            const totalExpenses = expenses.reduce((sum, e) => sum + e.amount, 0); 
            
            const expectedCash = Number(startingCash || 0) + cashFromOrders + totalIncomes - totalExpenses;
            
            const calculatedActualCash = showCalculator ? Object.entries(denoms).reduce((sum, [val, count]) => sum + (Number(val) * Number(count || 0)), 0) : Number(manualActualCash || 0);
            const diff = calculatedActualCash - expectedCash;

            const handleSave = (closeAccount) => {
                if (!showCalculator && manualActualCash === '') return showAlert('請輸入實際清點現金，或使用幣值盤點器');
                const saveProcess = async () => {
                    const newRecord = { id: targetDate, date: targetDate, startingCash: Number(startingCash || 0), incomes, expenses, cashFromOrders, expected: expectedCash, actual: calculatedActualCash, denoms: showCalculator ? denoms : null, diff, note, transfer: transferTotal, isClosed: closeAccount, timestamp: new Date().toISOString() };
                    const filtered = cashRecords.filter(c => c.date !== targetDate);
                    const updated = [newRecord, ...filtered].sort((a,b) => new Date(b.date) - new Date(a.date));
                    setCashRecords(updated);
                    
                    if (isCloudEnabled && saveSettingsToCloud) {
                        try {
                            await saveSettingsToCloud(updated, true);
                            if (closeAccount) {
                                showAlert(`【${targetDate}】 帳務已確認關帳，鎖定修改！\n(已自動同步備份至雲端試算表)`);
                            } else {
                                showAlert(`【${targetDate}】 對帳草稿已儲存\n(已自動同步備份至雲端試算表)`);
                            }
                        } catch (err) {
                            if (closeAccount) {
                                showAlert(`【${targetDate}】 帳務已確認關帳，鎖定修改！\n(⚠️雲端同步失敗，請稍後至設定頁手動備份)`);
                            } else {
                                showAlert(`【${targetDate}】 對帳草稿已儲存\n(⚠️雲端同步失敗，請稍後至設定頁手動備份)`);
                            }
                        }
                    } else {
                        if (closeAccount) {
                            showAlert(`【${targetDate}】 帳務已確認關帳，鎖定修改！`);
                        } else {
                            showAlert(`【${targetDate}】 對帳草稿已儲存`);
                        }
                    }
                };
                if (closeAccount && diff !== 0) showConfirm(`目前帳務短溢為 ${diff > 0 ? '+'+diff : diff}，確定要以目前狀態強行關帳嗎？`, saveProcess); else saveProcess();
            };

            const handleUnlock = () => { showConfirm('解鎖後將允許編輯此日期的帳務與工單，確定解鎖？', () => { setIsClosed(false); setCashRecords(cashRecords.map(c => c.date === targetDate ? { ...c, isClosed: false } : c)); }); };

            const handleDeleteRecord = (dateToDelete) => {
                showConfirm(`確定要刪除 ${dateToDelete} 的對帳紀錄嗎？`, async () => {
                    const updated = cashRecords.filter(c => c.date !== dateToDelete);
                    setCashRecords(updated);
                    
                    if (isCloudEnabled && saveSettingsToCloud) {
                        try {
                            await saveSettingsToCloud(updated, true);
                            showAlert(`【${dateToDelete}】 對帳紀錄已刪除，並同步至雲端。`);
                        } catch (err) {
                            showAlert(`【${dateToDelete}】 對帳紀錄已刪除！\n(⚠️雲端同步失敗，請稍後至設定頁手動備份)`);
                        }
                    } else {
                        showAlert(`【${dateToDelete}】 對帳紀錄已刪除。`);
                    }
                    
                    if (targetDate === dateToDelete) {
                        setTargetDate(getLocalDateString(new Date()));
                    }

            return (
                <div className="max-w-5xl mx-auto space-y-6 pb-20">

                        <div><h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><Wallet className="text-blue-600"/> 每日帳務與對帳</h2><p className="text-sm text-slate-500 mt-1">管理每日準備金、手工收支，並與系統工單進行現金盤點核對。</p></div>
                        <div className="flex items-center gap-3 w-full md:w-auto">{isClosed && <div className="bg-red-100 text-red-600 px-3 py-1.5 rounded-lg font-bold flex items-center gap-1 text-sm"><Lock size={16}/> 已關帳</div>}<input type="date" value={targetDate} onChange={(e) => setTargetDate(e.target.value)} className="flex-1 md:flex-none p-3 border-2 border-slate-300 rounded-lg text-slate-700 font-bold outline-none focus:border-blue-500" /></div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 relative">
                        {isClosed && (<div className="absolute inset-0 bg-slate-50/50 backdrop-blur-[1px] z-10 flex items-center justify-center rounded-xl border-2 border-slate-200"><div className="bg-white p-6 rounded-2xl shadow-2xl text-center max-w-sm m-4"><div className="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4"><Lock size={32}/></div><h3 className="text-xl font-bold text-slate-800 mb-2">此日期已關帳鎖定</h3><p className="text-slate-500 text-sm mb-6">為保護帳務資料完整性，關帳後無法直接修改對帳單與工單。</p><button onClick={handleUnlock} className="bg-slate-800 hover:bg-slate-700 text-white font-bold py-3 px-6 rounded-lg flex items-center justify-center gap-2 w-full transition-colors shadow-lg"><Unlock size={18}/> 解除鎖定</button></div></div>)}
                        
                        {/* 左側欄位：系統應有現金計算 */}
                        <div className="bg-slate-50 p-4 md:p-6 rounded-xl border border-slate-200 flex flex-col gap-4">

                            <div className="bg-white p-4 rounded-lg shadow-sm border border-slate-200"><label className="block text-xs font-bold text-slate-500 mb-1">① 開帳找零準備金 (+)</label><div className="flex items-center gap-2"><span className="text-slate-400 font-bold">$</span><input type="number" value={startingCash} onChange={(e) => setStartingCash(e.target.value)} placeholder="例如: 3000" className="w-full p-2 border-b-2 border-slate-200 text-xl font-bold text-slate-800 outline-none focus:border-blue-500 bg-transparent transition-colors" /></div></div>
                            
                            <div className="bg-white p-4 rounded-lg shadow-sm border border-slate-200"><label className="block text-xs font-bold text-slate-500 mb-1">② 今日工單現金收入 (+)</label><div className="text-3xl font-black text-blue-600 mt-1">${cashFromOrders.toLocaleString()}</div><div className="text-xs text-slate-400 mt-1.5 font-medium">不含匯款/其他收入: ${transferTotal.toLocaleString()}</div></div>
                            
                            <div className="bg-white p-4 rounded-lg shadow-sm border border-slate-200 flex-1">
                                <label className="block text-xs font-bold text-slate-500 mb-3">③ 其他手工現金收入 (+)</label>
                                <div className="space-y-2 mb-4">
                                    {incomes.map(inc => (
                                        <div key={inc.id} className="flex justify-between items-center bg-green-50 border border-green-100 p-2.5 rounded-lg text-sm">
                                            <span className="text-slate-700 font-medium">{inc.desc}</span>
                                            <div className="flex items-center gap-3">
                                                <span className="font-bold text-green-600">+${inc.amount}</span>
                                                <button onClick={() => removeIncome(inc.id)} className="text-green-400 hover:text-green-700 transition-colors p-1"><Trash2 size={16}/></button>
                                            </div>
                                        </div>
                                    ))}
                                    {incomes.length === 0 && <div className="text-xs text-slate-400 text-center py-4 border border-dashed rounded-lg">尚無額外收入紀錄</div>}
                                </div>
                                <div className="flex gap-2">
                                    <input type="text" placeholder="收入項目 (如:舊車回收)" value={incDesc} onChange={e=>setIncDesc(e.target.value)} className="flex-1 p-2.5 border border-slate-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500 min-w-0"/>
                                    <input type="number" placeholder="金額" value={incAmount} onChange={e=>setIncAmount(e.target.value)} className="w-24 p-2.5 border border-slate-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500"/>
                                    <button onClick={addIncome} className="bg-slate-800 text-white p-2.5 rounded-lg hover:bg-slate-700 transition-colors shadow-sm"><Plus size={20}/></button>
                                </div>
                            </div>

                            <div className="bg-white p-4 rounded-lg shadow-sm border border-slate-200 flex-1">
                                <label className="block text-xs font-bold text-slate-500 mb-3">④ 今日公庫現金支出 (-)</label>
                                <div className="space-y-2 mb-4">
                                    {expenses.map(exp => (
                                        <div key={exp.id} className="flex justify-between items-center bg-red-50 border border-red-100 p-2.5 rounded-lg text-sm">
                                            <span className="text-slate-700 font-medium">{exp.desc}</span>
                                            <div className="flex items-center gap-3">
                                                <span className="font-bold text-red-600">-${exp.amount}</span>
                                                <button onClick={() => removeExpense(exp.id)} className="text-red-400 hover:text-red-700 transition-colors p-1"><Trash2 size={16}/></button>
                                            </div>
                                        </div>
                                    ))}
                                    {expenses.length === 0 && <div className="text-xs text-slate-400 text-center py-4 border border-dashed rounded-lg">尚無支出紀錄</div>}
                                </div>
                                <div className="flex gap-2">
                                    <input type="text" placeholder="支出項目 (如:便當)" value={expDesc} onChange={e=>setExpDesc(e.target.value)} className="flex-1 p-2.5 border border-slate-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500 min-w-0"/>
                                    <input type="number" placeholder="金額" value={expAmount} onChange={e=>setExpAmount(e.target.value)} className="w-24 p-2.5 border border-slate-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500"/>
                                    <button onClick={addExpense} className="bg-slate-800 text-white p-2.5 rounded-lg hover:bg-slate-700 transition-colors shadow-sm"><Plus size={20}/></button>
                                </div>
                            </div>
                            
                            <div className="bg-slate-800 p-5 rounded-xl shadow-lg text-white mt-2"><div className="text-sm text-slate-300 mb-1 font-medium">系統應有現金總額 (=)</div><div className="text-4xl font-black">${expectedCash.toLocaleString()}</div></div>
                        </div>

                        {/* 右側欄位：實際現金盤點 */}
                        <div className="bg-white p-4 md:p-6 rounded-xl border border-slate-200 shadow-sm flex flex-col gap-4">
                            <div className="flex flex-wrap justify-between items-center mb-2 gap-2"><h3 className="text-lg font-bold text-slate-700 flex items-center gap-2"><CheckSquare size={18}/> 實際現金盤點</h3><div className="flex bg-slate-100 p-1.5 rounded-lg"><button onClick={() => setShowCalculator(false)} className={`px-4 py-1.5 text-xs font-bold rounded-md transition-colors ${!showCalculator ? 'bg-white shadow text-blue-600' : 'text-slate-500 hover:bg-slate-200'}`}>手動輸入</button><button onClick={() => setShowCalculator(true)} className={`px-4 py-1.5 text-xs font-bold rounded-md flex items-center gap-1 transition-colors ${showCalculator ? 'bg-white shadow text-blue-600' : 'text-slate-500 hover:bg-slate-200'}`}><Calculator size={12}/> 幣值盤點器</button></div></div>
                            {showCalculator ? (<div className="grid grid-cols-2 gap-3 mb-4 bg-slate-50 p-4 rounded-xl border border-slate-200">{[1000, 500, 100, 50, 10, 5, 1].map(val => (<div key={val} className="flex items-center gap-2 bg-white p-2 rounded-lg border border-slate-200 shadow-sm focus-within:ring-2 focus-within:ring-blue-500 transition-all"><div className="w-12 text-right font-bold text-slate-500">${val}</div><span className="text-xs text-slate-400">x</span><input type="number" min="0" value={denoms[val]} onChange={(e) => setDenoms({...denoms, [val]: e.target.value})} className="flex-1 w-full p-1.5 text-center font-bold text-slate-800 outline-none bg-transparent" placeholder="0" /></div>))}</div>) : (<div className="mb-4 bg-slate-50 p-6 rounded-xl border border-slate-200 flex flex-col items-center justify-center"><label className="block text-sm font-bold text-slate-500 mb-4">請直接輸入盤點總金額</label><input type="number" value={manualActualCash} onChange={(e) => setManualActualCash(e.target.value)} placeholder="$ 0" className="w-full max-w-xs p-4 border-2 border-slate-300 rounded-xl text-4xl font-black text-slate-800 focus:border-blue-500 focus:ring-4 focus:ring-blue-100 outline-none text-center tracking-wider bg-white shadow-inner transition-all" /></div>)}
                            <div className="flex justify-between items-center py-4 border-t border-b border-dashed border-slate-300"><span className="text-slate-500 font-bold">實際盤點總計</span><span className="text-3xl font-black text-slate-800">${calculatedActualCash.toLocaleString()}</span></div>
                            <div className={`p-5 rounded-xl font-bold flex justify-between items-center text-xl shadow-sm border ${diff === 0 ? 'bg-green-50 text-green-700 border-green-200' : diff > 0 ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-red-50 text-red-700 border-red-200'}`}><span>差異 (短溢)</span><span className="text-2xl font-black">{diff > 0 ? '+' : ''}{diff.toLocaleString()}</span></div>
                            <div className="mt-auto pt-4"><label className="block text-xs font-bold text-slate-500 mb-2">對帳備註</label><input type="text" value={note} onChange={(e) => setNote(e.target.value)} placeholder="如：老闆抽走1000、客人少給10元..." className="w-full p-3.5 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm bg-slate-50" /></div>
                            
                            <div className="flex gap-3 mt-6">
                                <button onClick={() => handleSave(false)} disabled={isSavingSettings} className="flex-1 bg-white border-2 border-blue-600 text-blue-600 hover:bg-blue-50 font-bold py-3.5 rounded-xl transition-colors disabled:opacity-50">儲存草稿</button>
                                <button onClick={() => handleSave(true)} disabled={isSavingSettings} className={`flex-1 ${isSavingSettings ? 'bg-blue-400 cursor-wait' : 'bg-blue-600 hover:bg-blue-700'} text-white font-bold py-3.5 rounded-xl flex items-center justify-center gap-2 transition-colors shadow-lg shadow-blue-200 active:scale-95`}>
                                    {isSavingSettings ? <RefreshCw className="animate-spin" size={20}/> : <Lock size={20}/>} 
                                    {isSavingSettings ? '同步處理中...' : '確認關帳'}
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    {/* 歷史對帳紀錄 */}
                    {cashRecords.length > 0 && (
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="bg-slate-50 p-4 border-b border-slate-200"><h3 className="font-bold text-slate-700">歷史對帳紀錄</h3></div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left text-sm whitespace-nowrap min-w-[700px]">
                                    <thead>
                                        <tr className="border-b border-slate-200 text-slate-500">
                                            <th className="p-4">日期</th>
                                            <th className="p-4 text-center">狀態</th>
                                            <th className="p-4 text-right">系統應收</th>
                                            <th className="p-4 text-right">實際清點</th>
                                            <th className="p-4 text-right">短溢</th>
                                            <th className="p-4">備註</th>
                                            <th className="p-4 text-center">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {cashRecords.map(rec => (
                                            <tr key={rec.id} className="hover:bg-slate-50 transition-colors">
                                                <td className="p-4 font-bold text-slate-700">{rec.date}</td>
                                                <td className="p-4 text-center">{rec.isClosed ? <span className="bg-slate-200 text-slate-600 px-3 py-1 rounded-lg text-xs flex items-center justify-center gap-1 w-max mx-auto font-bold"><Lock size={12}/>關帳</span> : <span className="text-slate-400 text-xs font-medium border border-slate-200 px-3 py-1 rounded-lg bg-white">草稿</span>}</td>
                                                <td className="p-4 text-right text-slate-600 font-medium">${(rec.expected || 0).toLocaleString()}</td>
                                                <td className="p-4 text-right font-black text-slate-800">${(rec.actual || 0).toLocaleString()}</td>
                                                <td className={`p-4 text-right font-black ${rec.diff === 0 ? 'text-green-600' : rec.diff > 0 ? 'text-blue-600' : 'text-red-600'}`}>{rec.diff > 0 ? '+' : ''}{(rec.diff || 0).toLocaleString()}</td>
                                                <td className="p-4 text-slate-500 text-xs truncate max-w-[150px]">{rec.note || '-'}</td>
                                                <td className="p-4 text-center">
                                                    <div className="flex justify-center gap-2">
                                                        <button onClick={() => setTargetDate(rec.date)} className="text-blue-600 text-xs font-bold bg-blue-50 hover:bg-blue-100 border border-blue-100 px-3 py-1.5 rounded-lg transition-colors">查看</button>
                                                        <button onClick={() => handleDeleteRecord(rec.date)} className="text-red-500 text-xs font-bold bg-red-50 hover:bg-red-100 border border-red-100 p-1.5 rounded-lg transition-colors" title="刪除紀錄"><Trash2 size={16} /></button>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
